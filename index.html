<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IKIGAIER — Un ecosistema para unir el hacer y el ser. Próximamente.">
  <title>IKIGAIER</title>
  <link rel="canonical" href="https://manelrueda.com/ikigaier/">

  <!-- Open Graph -->
  <meta property="og:title" content="IKIGAIER">
  <meta property="og:description" content="Un ecosistema para unir el hacer y el ser. Próximamente.">
  <meta property="og:url" content="https://manelrueda.com/ikigaier/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="IKIGAIER">
  <meta name="twitter:description" content="Un ecosistema para unir el hacer y el ser. Próximamente.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro:       #272727;
      --gris-medio:  #6E6E6E;
      --gris-claro:  #A8A8A8;
      --blanco-pag:  #FDFBF7;
      --terracota:   #C2866B;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.7;
      color: var(--negro);
      background-color: var(--blanco-pag);
      letter-spacing: 0.04em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 2rem;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2.2rem;
      max-width: 600px;
      width: 100%;
    }

    .logo {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--negro);
    }

    .logo span {
      color: var(--terracota);
    }

    .tag {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gris-claro);
    }

    .mensaje {
      font-size: 1.05rem;
      color: var(--gris-medio);
      max-width: 460px;
      line-height: 1.8;
      font-weight: 300;
    }

    .frase {
      font-size: 0.85rem;
      color: var(--gris-claro);
      letter-spacing: 0.08em;
      font-weight: 300;
    }

    hr {
      border: none;
      border-top: 1px solid var(--gris-claro);
      opacity: 0.25;
      width: 60px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .page { gap: 1.8rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-label="IKIGAIER · Próximamente">
      <span class="tag">próximamente</span>
      <h1 class="logo">ik<span>igai</span>er</h1>

      <hr>

      <p class="mensaje">
        Un ecosistema para unir el hacer y el ser.<br>
        El libro, el cuaderno y el taller.<br>
        Sin fórmulas, sin promesas fáciles, sin atajos.
      </p>

      <p class="frase">Camina sin separarte de ti.</p>
    </section>
  </main>
</body>
</html>
